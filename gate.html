<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gate — Decode the Melody</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="gate-page">
    <div class="gate-container">
        <div class="desk-scene">
            <div class="candle">
                <div class="candle-flame"></div>
                <div class="candle-wick"></div>
                <div class="candle-body"></div>
            </div>
            <div class="case-note">
                <div class="note-paper">
                    <div class="note-stamp">TOP SECRET</div>
                    <p class="note-text"><strong>Case File #0042</strong><br><br>The garden is sealed behind an iron gate.<br>Decode the melody hidden in the static.<br><br><em>Listen, then type the word.</em></p>
                    <div class="note-inkblot"></div>
                </div>
            </div>
            <div class="morse-controls">
                <button id="playMorseBtn" class="btn-morse-play">Play the Signal</button>
                <span class="morse-status" id="morseStatus"></span>
            </div>
            <div class="input-group">
                <input type="text" id="passwordInput" class="password-input" placeholder="Decoded word..." autocomplete="off">
                <button id="submitBtn" class="btn-submit">Unlock Gate</button>
            </div>
            <p class="hint-message" id="hintMessage"></p>
            <div class="gate-visual">
                <div class="gate-left"></div>
                <div class="gate-lock"></div>
                <div class="gate-right"></div>
            </div>
        </div>
    </div>
    <script src="js/morse.js"></script>
</body>
</html>
