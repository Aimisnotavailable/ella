<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ELLA</title>

    <!-- Google Fonts -->

    <link rel="stylesheet" href="styles.css" />
</head>
<body>

                    <path d="M38 98 Q56 68 72 42"/><circle cx="72" cy="42" r="2.2" fill="#E8A0A8"/>

            <g id="spider-lily-petal">

    <!-- ==================== GARDEN GATE OVERLAY ==================== -->
    <div class="gate-overlay" id="gateOverlay" aria-label="Garden gate - tap to open">
        <div class="gate-overlay__content">
            <div class="gate-overlay__lily">
                <svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg" class="gate-lily-svg">
                    <path d="M100 280 Q98 200 100 155" stroke="#6B9E6B" stroke-width="3.2" fill="none" stroke-linecap="round"/>
                    <g class="gate-petal" style="--petal-rotate:-55deg;">
                        <path d="M100 155 Q85 118 70 85 Q62 68 72 55" stroke="#C41E3A" stroke-width="2.6" fill="none" stroke-linecap="round"/>
                        <path d="M72 55 Q68 42 70 35" stroke="#C41E3A" stroke-width="1.1" fill="none" stroke-linecap="round"/>
                        <circle cx="70" cy="35" r="2.4" fill="#E8A0A8"/>
                    </g>
                    <g class="gate-petal" style="--petal-rotate:55deg;">
                        <path d="M100 155 Q115 118 130 85 Q138 68 128 55" stroke="#C41E3A" stroke-width="2.6" fill="none" stroke-linecap="round"/>

                        <circle cx="130" cy="35" r="2.4" fill="#E8A0A8"/>
                    </g>
                    <g class="gate-petal" style="--petal-rotate:-105deg;">
                        <path d="M100 155 Q68 140 45 115 Q35 100 42 85" stroke="#C41E3A" stroke-width="2.6" fill="none" stroke-linecap="round"/>
                        <path d="M42 85 Q38 72 35 66" stroke="#C41E3A" stroke-width="1.1" fill="none" stroke-linecap="round"/>
                        <circle cx="35" cy="66" r="2.4" fill="#E8A0A8"/>
                    </g>
                    <g class="gate-petal" style="--petal-rotate:105deg;">
                        <path d="M100 155 Q132 140 155 115 Q165 100 158 85" stroke="#C41E3A" stroke-width="2.6" fill="none" stroke-linecap="round"/>
                        <path d="M158 85 Q162 72 165 66" stroke="#C41E3A" stroke-width="1.1" fill="none" stroke-linecap="round"/>
                        <circle cx="165" cy="66" r="2.4" fill="#E8A0A8"/>
                    </g>
                    <g class="gate-petal" style="--petal-rotate:-25deg;">
                        <path d="M100 155 Q92 120 85 90 Q80 72 88 58" stroke="#C41E3A" stroke-width="2.3" fill="none" stroke-linecap="round"/>
                        <path d="M88 58 Q86 46 84 38" stroke="#C41E3A" stroke-width="0.9" fill="none" stroke-linecap="round"/>
                        <circle cx="84" cy="38" r="1.9" fill="#E8A0A8"/>
                    </g>
                    <g class="gate-petal" style="--petal-rotate:25deg;">
                        <path d="M100 155 Q108 120 115 90 Q120 72 112 58" stroke="#C41E3A" stroke-width="2.3" fill="none" stroke-linecap="round"/>
                        <path d="M112 58 Q114 46 116 38" stroke="#C41E3A" stroke-width="0.9" fill="none" stroke-linecap="round"/>
                        <circle cx="116" cy="38" r="1.9" fill="#E8A0A8"/>
                    </g>
                </svg>
            </div>
            <p class="gate-overlay__text" id="gateText">🌸 For you, Ella</p>
            <p class="gate-overlay__hint">Tap to open the garden</p>
        </div>
    </div>

    <!-- ==================== HERO SECTION ==================== -->
    <section class="hero" id="hero">
        <div class="hero__petal-container" id="petalContainer" aria-hidden="true"></div>

        <div class="sparkle" style="top:10%;left:7%;animation-delay:0s;"><svg width="16" height="16"><use href="#sparkle"/></svg></div>
        <div class="sparkle" style="top:16%;right:9%;animation-delay:1.1s;"><svg width="13" height="13"><use href="#sparkle"/></svg></div>
        <div class="sparkle" style="top:52%;left:12%;animation-delay:1.9s;"><svg width="15" height="15"><use href="#sparkle"/></svg></div>
        <div class="sparkle" style="top:58%;right:10%;animation-delay:0.6s;"><svg width="11" height="11"><use href="#sparkle"/></svg></div>
        <div class="sparkle" style="top:35%;left:4%;animation-delay:2.4s;"><svg width="12" height="12"><use href="#sparkle"/></svg></div>

        <div class="hero__lily hero__lily--left" id="heroLilyLeft" aria-hidden="true">
            <svg viewBox="0 0 120 260" class="swaying-lily" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;">
                <path d="M60 250 Q58 180 60 130" stroke="#6B9E6B" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                <g class="hero-lily-petal" style="--hl-origin-x:60px;--hl-origin-y:130px;--hl-rotate:-50deg;">
                    <path d="M60 130 Q48 100 36 74 Q30 58 40 46" stroke="#C41E3A" stroke-width="2.4" fill="none" stroke-linecap="round"/>
                    <path d="M40 46 Q36 34 38 28" stroke="#C41E3A" stroke-width="1" fill="none" stroke-linecap="round"/><circle cx="38" cy="28" r="2.2" fill="#E8A0A8"/>
                </g>
                <g class="hero-lily-petal" style="--hl-origin-x:60px;--hl-origin-y:130px;--hl-rotate:50deg;">
                    <path d="M60 130 Q72 100 84 74 Q90 58 80 46" stroke="#C41E3A" stroke-width="2.4" fill="none" stroke-linecap="round"/>
                    <path d="M80 46 Q84 34 82 28" stroke="#C41E3A" stroke-width="1" fill="none" stroke-linecap="round"/><circle cx="82" cy="28" r="2.2" fill="#E8A0A8"/>
                </g>
                <g class="hero-lily-petal" style="--hl-origin-x:60px;--hl-origin-y:130px;--hl-rotate:-95deg;">
                    <path d="M60 130 Q38 118 22 98 Q14 84 20 70" stroke="#C41E3A" stroke-width="2.4" fill="none" stroke-linecap="round"/>
                    <path d="M20 70 Q16 58 14 52" stroke="#C41E3A" stroke-width="1" fill="none" stroke-linecap="round"/><circle cx="14" cy="52" r="2.2" fill="#E8A0A8"/>
                </g>
                <g class="hero-lily-petal" style="--hl-origin-x:60px;--hl-origin-y:130px;--hl-rotate:95deg;">
                    <path d="M60 130 Q82 118 98 98 Q106 84 100 70" stroke="#C41E3A" stroke-width="2.4" fill="none" stroke-linecap="round"/>
                    <path d="M100 70 Q104 58 106 52" stroke="#C41E3A" stroke-width="1" fill="none" stroke-linecap="round"/><circle cx="106" cy="52" r="2.2" fill="#E8A0A8"/>
                </g>
                <g class="hero-lily-petal" style="--hl-origin-x:60px;--hl-origin-y:130px;--hl-rotate:-22deg;">
                    <path d="M60 130 Q54 104 48 80 Q44 64 52 52" stroke="#C41E3A" stroke-width="2.1" fill="none" stroke-linecap="round"/>
                    <circle cx="52" cy="52" r="1.8" fill="#E8A0A8"/>
                </g>
                <g class="hero-lily-petal" style="--hl-origin-x:60px;--hl-origin-y:130px;--hl-rotate:22deg;">
                    <path d="M60 130 Q66 104 72 80 Q76 64 68 52" stroke="#C41E3A" stroke-width="2.1" fill="none" stroke-linecap="round"/>
                    <circle cx="68" cy="52" r="1.8" fill="#E8A0A8"/>
                </g>
            </svg>
        </div>
        <div class="hero__lily hero__lily--right" id="heroLilyRight" aria-hidden="true">
            <svg viewBox="0 0 100 220" class="swaying-lily" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;">
                <path d="M50 210 Q48 150 50 110" stroke="#6B9E6B" stroke-width="2.3" fill="none" stroke-linecap="round"/>
                <g class="hero-lily-petal" style="--hl-origin-x:50px;--hl-origin-y:110px;--hl-rotate:-45deg;">
                    <path d="M50 110 Q40 84 30 60 Q24 46 34 36" stroke="#C41E3A" stroke-width="2.2" fill="none" stroke-linecap="round"/><circle cx="34" cy="36" r="2" fill="#E8A0A8"/>
                </g>
                <g class="hero-lily-petal" style="--hl-origin-x:50px;--hl-origin-y:110px;--hl-rotate:45deg;">
                    <path d="M50 110 Q60 84 70 60 Q76 46 66 36" stroke="#C41E3A" stroke-width="2.2" fill="none" stroke-linecap="round"/><circle cx="66" cy="36" r="2" fill="#E8A0A8"/>
                </g>
                <g class="hero-lily-petal" style="--hl-origin-x:50px;--hl-origin-y:110px;--hl-rotate:-85deg;">
                    <path d="M50 110 Q30 98 16 82 Q8 70 14 58" stroke="#C41E3A" stroke-width="2.2" fill="none" stroke-linecap="round"/><circle cx="14" cy="58" r="2" fill="#E8A0A8"/>
                </g>
                <g class="hero-lily-petal" style="--hl-origin-x:50px;--hl-origin-y:110px;--hl-rotate:85deg;">
                    <path d="M50 110 Q70 98 84 82 Q92 70 86 58" stroke="#C41E3A" stroke-width="2.2" fill="none" stroke-linecap="round"/><circle cx="86" cy="58" r="2" fill="#E8A0A8"/>
                </g>
                <g class="hero-lily-petal" style="--hl-origin-x:50px;--hl-origin-y:110px;--hl-rotate:-18deg;">
                    <path d="M50 110 Q45 88 40 68 Q36 54 44 44" stroke="#C41E3A" stroke-width="2" fill="none" stroke-linecap="round"/><circle cx="44" cy="44" r="1.7" fill="#E8A0A8"/>
                </g>
                <g class="hero-lily-petal" style="--hl-origin-x:50px;--hl-origin-y:110px;--hl-rotate:18deg;">
                    <path d="M50 110 Q55 88 60 68 Q64 54 56 44" stroke="#C41E3A" stroke-width="2" fill="none" stroke-linecap="round"/><circle cx="56" cy="44" r="1.7" fill="#E8A0A8"/>
                </g>
            </svg>
        </div>

        <div class="hero__content">
            <p class="hero__subtitle">🌸</p>
            <h1 class="hero__title" id="friendName">Ella</h1>
            <p class="hero__message">
                Happiest Birthday to the <em>tiniest</em> kid with the <em>biggest</em> personality<br />
                I hope you are a SWIFTIE cause this is useless if not.
            </p>
            <p class="hero__birthday" id="heroBirthday"></p>
        </div>
        <div class="hero__scroll-hint" onclick="document.getElementById('album-garden').scrollIntoView({behavior:'smooth'})" title="Scroll down">
            <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
    </section>

    <!-- ==================== ALBUM GARDEN ==================== -->
    <section class="section album-garden reveal" id="album-garden">
        <div class="section__inner">
            <h2 class="section__heading">Album</h2>
            <p class="section__subheading">Tap a cover to open its story</p>
            <div class="section__divider">
                <span class="section__divider-line"></span>
                <svg viewBox="0 0 28 40"><use href="#spider-lily-side"/></svg>
                <span class="section__divider-line"></span>
            </div>
            <div class="album-cards" id="albumCards">
            </div>
        </div>
    </section>

    <!-- ==================== ALBUM MODAL ==================== -->
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="modal-book" id="modalBook">
        <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
        <div class="modal-vines">
            <svg viewBox="0 0 800 500" class="modal-vines-svg" preserveAspectRatio="none">
                <path d="M20 450 Q60 300 20 150 Q0 50 60 20" stroke="#4A7C4A" stroke-width="4" fill="none" stroke-linecap="round"/>
                <path d="M780 450 Q740 300 780 150 Q800 50 740 20" stroke="#4A7C4A" stroke-width="4" fill="none" stroke-linecap="round"/>
                <ellipse cx="45" cy="120" rx="12" ry="5" fill="#6B9E6B" transform="rotate(30,45,120)"/>
                <ellipse cx="755" cy="120" rx="12" ry="5" fill="#6B9E6B" transform="rotate(-30,755,120)"/>
                <ellipse cx="35" cy="280" rx="10" ry="4" fill="#6B9E6B" transform="rotate(-20,35,280)"/>
                <ellipse cx="765" cy="280" rx="10" ry="4" fill="#6B9E6B" transform="rotate(20,765,280)"/>
            </svg>
            <div class="modal-lily swaying-lily">
                <svg viewBox="0 0 80 200"><use href="#spider-lily-full"/></svg>
            </div>
        </div>

        <div class="modal-content">
            <div class="modal-page modal-page--left">
                <div class="modal-album-cover">
                    <div class="modal-petal-container" id="modalPetalContainer" aria-hidden="true"></div>
                    <img id="modalAlbumCover" src="" alt="Album cover" class="modal-album-img">
                </div>
            </div>
            <div class="modal-page modal-page--right">
                <div class="now-playing" id="nowPlaying"></div>
                <div class="modal-lyrics" id="modalLyrics"></div>
            </div>
        </div>

        <div class="modal-player">
            <div class="modal-vinyl" id="modalVinyl">
                <svg viewBox="0 0 60 60" class="vinyl-record-svg">
                    <circle cx="30" cy="30" r="28" fill="#1a1a1a" stroke="#333" stroke-width="1.2"/>
                    <circle cx="30" cy="30" r="24" fill="none" stroke="#2a2a2a" stroke-width="0.6"/>
                    <circle cx="30" cy="30" r="20" fill="none" stroke="#2a2a2a" stroke-width="0.6"/>
                    <circle cx="30" cy="30" r="16" fill="none" stroke="#2a2a2a" stroke-width="0.6"/>
                    <circle cx="30" cy="30" r="12" fill="none" stroke="#2a2a2a" stroke-width="0.6"/>
                    <circle cx="30" cy="30" r="9" fill="#C41E3A"/>
                    <circle cx="30" cy="30" r="6.5" fill="#FADDE1"/>
                    <circle cx="30" cy="30" r="2.2" fill="#FDFBF7"/>
                    <path d="M30 28 Q28 24 27 21" stroke="#C41E3A" stroke-width="0.8" fill="none" stroke-linecap="round"/>
                    <path d="M30 28 Q32 24 33 21" stroke="#C41E3A" stroke-width="0.8" fill="none" stroke-linecap="round"/>
                    <circle cx="27" cy="21" r="0.9" fill="#E8A0A8"/>
                    <circle cx="33" cy="21" r="0.9" fill="#E8A0A8"/>
                </svg>
            </div>
            <div class="waveform-pill" id="waveformPill">
                <div class="waveform-bar"></div>
                <div class="waveform-bar"></div>
                <div class="waveform-bar"></div>
                <div class="waveform-bar"></div>
                <div class="waveform-bar"></div>
            </div>
        </div>
    </div>

    <!-- ==================== FOOTER ==================== -->
    <footer class="footer">
        <div class="footer__lilies">
            <svg viewBox="0 0 50 280" class="swaying-lily"><use href="#spider-lily-full"/></svg>
            <svg viewBox="0 0 40 200" class="swaying-lily"><use href="#spider-lily-bud"/></svg>
            <svg viewBox="0 0 55 260" class="swaying-lily"><use href="#spider-lily-side"/></svg>
        </div>
        <p>Made for <span id="footerFriendName"> <a href="https://aimisnotavailable.github.io/ProjectR/"> Ella </a> </span> — May you continue to always bloom.🌸</p>
    </footer>

    <script src="script.js" defer></script>
</body>
</html>
