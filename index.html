<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 A Case Awaits...</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="landing-page">
    <div class="petal-container" id="petalContainer" aria-hidden="true"></div>

    <main class="landing-content">
        <div class="greeting-card">
            <span class="tiny-icon">🔍</span>
            <h1 class="handwritten-title">For the Detective</h1>
            <p class="handwritten-subtitle">
                Who loves flowers, books,<br />
                and a certain songwriter...
            </p>
            <div class="divider">~ ✿ ~</div>
            <p class="invitation-text">
                A case awaits.<br />
                But first — you'll need to crack the code.
            </p>
            <a href="gate.html" class="btn-case-file">
                📁 Open the Case File
            </a>
        </div>
        <p class="footer-note">🎵 Taylor's melodies are hidden within. Listen closely.</p>
    </main>

    <script>
        (function () {
            const container = document.getElementById('petalContainer');
            const petalShapes = ['🌸', '🌷', '💮', '🌺', '✿', '🌼', '🍂', '🌹'];
            for (let i = 0; i < 35; i++) {
                const petal = document.createElement('span');
                petal.className = 'falling-petal';
                petal.textContent = petalShapes[Math.floor(Math.random() * petalShapes.length)];
                petal.style.left = Math.random() * 100 + '%';
                petal.style.fontSize = (10 + Math.random() * 20) + 'px';
                petal.style.animationDuration = (8 + Math.random() * 18) + 's';
                petal.style.animationDelay = Math.random() * 15 + 's';
                petal.style.opacity = 0.5 + Math.random() * 0.5;
                container.appendChild(petal);
            }
        })();
    </script>
</body>
</html>
