<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Garden — Willow's Melody</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="garden-page">
    <script>
        if (!sessionStorage.getItem('gardenUnlocked')) window.location.href = 'gate.html';
    </script>
    <div class="garden-sky"></div>
    <div class="garden-hills">
        <div class="hill hill-back"></div>
        <div class="hill hill-mid"></div>
        <div class="hill hill-front"></div>
    </div>
    <div class="fireflies-container" id="firefliesContainer"></div>
    <div class="garden-flowers" id="gardenFlowers"></div>
    <div class="floating-text" id="floatingText"></div>

    <!-- Lyric Portrait (Karaoke style) -->
    <div class="portrait-overlay" id="portraitOverlay">
        <button class="portrait-close-btn" id="portraitCloseBtn">✕</button>
        <div class="portrait-text-block" id="portraitTextBlock"></div>
        <p class="portrait-song-label" id="portraitSongLabel"></p>
    </div>

    <audio id="gardenAudio" preload="auto"></audio>

    <div class="case-closed-overlay" id="caseClosedOverlay">
        <div class="case-closed-card">
            <h2>Case Closed!</h2>
            <p>You've explored every corner of the garden,<br>unlocked every flower, and felt the willow's whisper.<br><br><strong>Happy Birthday, dear detective.</strong><br>May your year bloom with wonder.</p>
            <button class="btn-case-file" id="caseClosedDismissBtn">Thank You</button>
        </div>
    </div>

    <script src="js/garden.js"></script>
</body>
</html>
